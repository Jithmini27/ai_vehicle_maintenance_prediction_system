<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Vehicle</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/style.css') }}">

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/owner.css') }}">
</head>

<body class="dashboard-page">

<div class="page-section">

    <div class="section-header">
        <div>
            <h1>Add Vehicle</h1>
            <p>Register a new vehicle to the system</p>
        </div>

        <div class="section-actions">
            <a href="{{ url_for('owner.view_vehicles') }}"
               class="btn-outline">
               View Vehicles
            </a>

            <a href="{{ url_for('owner.owner_dashboard') }}"
               class="btn-outline">
               Dashboard
            </a>
        </div>
    </div>


    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        <div class="flash-wrapper">
            {% for category, message in messages %}
                <p class="flash-message {{ category }}">
                    {{ message }}
                </p>
            {% endfor %}
        </div>
      {% endif %}
    {% endwith %}


    <div class="form-card">

        <form method="POST" class="custom-form">

            <div class="form-group">
                <label>Plate Number</label>
                <input type="text" name="plate_no" required>
            </div>

            <div class="form-group">
                <label>Brand</label>
                <input type="text" name="brand" required>
            </div>

            <div class="form-group">
                <label>Model</label>
                <input type="text" name="model" required>
            </div>

            <div class="form-group">
                <label>Year</label>
                <input type="number" name="year" required>
            </div>

            <div class="form-group">
                <label>Fuel Type</label>
                <select name="fuel_type" required>
                    <option value="Petrol">Petrol</option>
                    <option value="Diesel">Diesel</option>
                    <option value="Hybrid">Hybrid</option>
                    <option value="Electric">Electric</option>
                </select>
            </div>

            <div class="form-group">
                <label>Last Service Date</label>
                <input type="date" name="last_service_date">
            </div>

            <div class="form-group">
                <label>Current Mileage</label>
                <input type="number" name="current_mileage" required>
            </div>


            <div class="form-actions">
                <button type="submit" class="btn-primary">
                    Add Vehicle
                </button>

                <a href="{{ url_for('owner.view_vehicles') }}"
                   class="btn-secondary">
                   Cancel
                </a>
            </div>

        </form>

    </div>

</div>

</body>
</html>
