<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Vehicle</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/style.css') }}">

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/owner.css') }}">
</head>

<body class="dashboard-page">

<div class="page-section">

    <div class="section-header">
        <div>
            <h1>Edit Vehicle</h1>
            <p>Update vehicle information</p>
        </div>

        <div class="section-actions">
            <a href="{{ url_for('owner.view_vehicles') }}"
               class="btn-outline">
               My Vehicles
            </a>

            <a href="{{ url_for('owner.owner_dashboard') }}"
               class="btn-outline">
               Dashboard
            </a>
        </div>
    </div>


    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        <div class="flash-wrapper">
            {% for category, message in messages %}
                <p class="flash-message {{ category }}">
                    {{ message }}
                </p>
            {% endfor %}
        </div>
      {% endif %}
    {% endwith %}


    <div class="form-card">

        <form method="POST" class="custom-form">

            <div class="form-group">
                <label>Plate Number</label>
                <input type="text"
                       name="plate_no"
                       value="{{ vehicle.plate_no }}"
                       required>
            </div>


            <div class="form-group">
                <label>Brand</label>
                <input type="text"
                       name="brand"
                       value="{{ vehicle.brand }}"
                       required>
            </div>


            <div class="form-group">
                <label>Model</label>
                <input type="text"
                       name="model"
                       value="{{ vehicle.model }}"
                       required>
            </div>


            <div class="form-group">
                <label>Year</label>
                <input type="number"
                       name="year"
                       value="{{ vehicle.year }}"
                       required>
            </div>


            <div class="form-group">
                <label>Fuel Type</label>

                <select name="fuel_type" required>

                    <option value="Petrol"
                        {% if vehicle.fuel_type == 'Petrol' %}selected{% endif %}>
                        Petrol
                    </option>

                    <option value="Diesel"
                        {% if vehicle.fuel_type == 'Diesel' %}selected{% endif %}>
                        Diesel
                    </option>

                    <option value="Hybrid"
                        {% if vehicle.fuel_type == 'Hybrid' %}selected{% endif %}>
                        Hybrid
                    </option>

                    <option value="Electric"
                        {% if vehicle.fuel_type == 'Electric' %}selected{% endif %}>
                        Electric
                    </option>

                </select>

            </div>


            <div class="form-group">
                <label>Last Service Date</label>
                <input type="date"
                       name="last_service_date"
                       value="{{ vehicle.last_service_date }}">
            </div>


            <div class="form-group">
                <label>Current Mileage</label>
                <input type="number"
                       name="current_mileage"
                       value="{{ vehicle.current_mileage }}"
                       required>
            </div>


            <div class="form-actions">

                <button type="submit"
                        class="btn-primary">
                        Update Vehicle
                </button>

                <a href="{{ url_for('owner.view_vehicles') }}"
                   class="btn-secondary">
                   Cancel
                </a>

            </div>

        </form>

    </div>

</div>

</body>
</html>
